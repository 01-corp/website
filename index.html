<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>01-corp</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #000;
    color: #00ff00;
    font-family: "Courier New", Courier, monospace;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(1.25rem, 4vw, 2.5rem);
    letter-spacing: 0.05em;
  }
  .line { white-space: pre; }
  .cursor {
    display: inline-block;
    width: 0.6em;
    background: #00ff00;
    color: #00ff00;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink {
    0%, 50%   { opacity: 1; }
    50.01%, 100% { opacity: 0; }
  }
</style>
</head>
<body>
  <div class="line">01-corp$ <span class="cursor">&nbsp;</span></div>
</body>
